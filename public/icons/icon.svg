<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="96" fill="#1E3A5F"/>
  <!-- Magnifying glass lens -->
  <circle cx="230" cy="230" r="120" stroke="#E8A838" stroke-width="28" fill="none"/>
  <!-- Handle -->
  <line x1="320" y1="320" x2="420" y2="420" stroke="#E8A838" stroke-width="32" stroke-linecap="round"/>
  <!-- Medical cross inside lens -->
  <rect x="210" y="180" width="40" height="100" rx="6" fill="white"/>
  <rect x="180" y="210" width="100" height="40" rx="6" fill="white"/>
</svg>
